# =============================================================================
#  Sveltia CMS — content manager for the Watershed Hydrology Lab website.
#  Panel:  https://watershedhydrologylab.com/admin/
#
#  Sveltia is a drop-in, Decap-compatible CMS. "Save" commits to GitHub
#  (branch: main); Cloudflare Pages then rebuilds the live site. Editors
#  never touch code.
#
#  NOTE: this CMS edits CONTENT (text, images, items, order). Visual DESIGN
#  (fonts, colors, sizes, positioning, backgrounds) lives in the theme CSS
#  (assets/whl.css) on purpose, to keep the site consistent.
#
#  ⚠️ Every front-matter field is enumerated below. Sveltia drops any field
#     it doesn't know about, so DO NOT remove the `hidden` fields — they keep
#     the page's structural settings intact when an editor saves.
# =============================================================================

backend:
  name: github
  repo: HugoMachadoRodrigues/waterhydrolab.github.io
  branch: main
  base_url: https://sveltia-cms-auth.rcrechydrologymactwo.workers.dev

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

site_url: https://watershedhydrologylab.com
display_url: https://watershedhydrologylab.com
logo_url: /assets/img/whl_logo.png

collections:
  # ---------------------------------------------------------------------------
  #  HOME — the landing page (hero, research pillars, PI card, about text).
  # ---------------------------------------------------------------------------
  - name: home
    label: "Home page"
    description: "The landing page: hero tagline, research pillars, PI card, intro text."
    files:
      - name: about
        label: "Home / About"
        file: "_pages/about.md"
        fields:
          - { name: layout, widget: hidden, default: about }
          - { name: title, widget: hidden, default: about }
          - { name: permalink, widget: hidden, default: "/" }
          - { name: subtitle, label: "Subtitle (HTML, under the lab name)", widget: text }
          - name: hero
            label: "Hero (landing banner)"
            widget: object
            fields:
              - { name: logo, label: "Logo image", widget: image }
              - { name: tagline, label: "Tagline", widget: text }
              - name: pillars
                label: "Research pillars (3 cards)"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: text, label: "Description", widget: text }
                  - { name: href, label: "Links to", widget: string }
          - name: profile
            label: "PI photo & contact card"
            widget: object
            fields:
              - { name: align, widget: hidden, default: right }
              - { name: image, label: "PI photo", widget: image }
              - { name: image_circular, label: "Round crop", widget: boolean, default: false }
              - { name: more_info, label: "Contact card (HTML)", widget: text }
          - { name: selected_papers, widget: hidden, default: true }
          - { name: social, widget: hidden, default: true }
          - name: announcements
            widget: object
            fields:
              - { name: enabled, widget: hidden, default: true }
              - { name: scrollable, widget: hidden, default: true }
              - { name: limit, widget: hidden, default: 5 }
          - name: latest_posts
            widget: object
            fields:
              - { name: enabled, widget: hidden, default: false }
              - { name: scrollable, widget: hidden, default: true }
              - { name: limit, widget: hidden, default: 3 }
          - name: about_photos
            label: "About photos (gallery under the About text)"
            label_singular: "Photo"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.caption}}"
            fields:
              - { name: image, label: "Photo", widget: image }
              - { name: caption, label: "Caption (optional)", widget: string, required: false }
          - { name: body, label: "“About the Lab” text", widget: markdown }

  # ---------------------------------------------------------------------------
  #  NEWS — most-used. Add/edit short announcements.
  # ---------------------------------------------------------------------------
  - name: news
    label: "News & Announcements"
    label_singular: "Announcement"
    description: "Short updates shown on the homepage strip and the News page."
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date]
    fields:
      # Hidden technical fields (kept so saving never drops them).
      - { name: layout, widget: hidden, default: post }
      - { name: inline, widget: hidden, default: true }
      - { name: related_posts, widget: hidden, default: false }
      # Fields the editor sees, in order:
      - { name: date, label: "Date", widget: datetime }
      - { name: headline, label: "Headline (optional)", widget: string, required: false }
      - { name: image, label: "Photo (optional — shown beside the text)", widget: image, required: false }
      - { name: body, label: "Announcement text", widget: markdown }

  # ---------------------------------------------------------------------------
  #  RESEARCH PROJECTS — theme cards on the Research page.
  # ---------------------------------------------------------------------------
  - name: projects
    label: "Research Projects"
    label_singular: "Project"
    description: "Research-theme cards shown on the Research page."
    folder: "_projects"
    create: true
    sortable_fields: [importance, title]
    fields:
      - { name: layout, label: Layout, widget: hidden, default: page }
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Card subtitle (short)", widget: text }
      - { name: img, label: "Cover / banner image", widget: image, required: false }
      - { name: importance, label: "Order (1 = shown first)", widget: number, default: 1, value_type: int }
      - { name: category, label: Category, widget: hidden, default: research }
      - name: buttons
        label: "Buttons (foot of the page)"
        label_singular: "Button"
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.label}}"
        fields:
          - { name: label, label: "Label", widget: string }
          - { name: url, label: "Link (https://…, mailto:…, tel:…, or /page/)", widget: string }
          - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
          - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
      - { name: body, label: "Full content", widget: markdown }

  # ---------------------------------------------------------------------------
  #  TEAM / PEOPLE — reorder members, swap photos, edit roles. (Bios are in
  #  separate files for now — see the "Team Bios" note; a refactor will fold
  #  them in here.)
  # ---------------------------------------------------------------------------
  - name: team
    label: "Team / People"
    description: "Members of the lab. Drag to reorder; edit photo and role."
    files:
      - name: people
        label: "People list"
        file: "_pages/profiles.md"
        fields:
          - { name: layout, widget: hidden, default: profiles }
          - { name: permalink, widget: hidden, default: "/people/" }
          - { name: title, widget: hidden, default: people }
          - { name: description, label: "SEO description", widget: text }
          - { name: nav, widget: hidden, default: true }
          - { name: nav_order, widget: hidden, default: 2 }
          - name: profiles
            label: "Members (drag to reorder)"
            label_singular: "Member"
            widget: list
            summary: "{{fields.image}}"
            fields:
              - { name: align, label: "Photo side", widget: select, options: [left, right], default: right }
              - { name: image, label: "Photo", widget: image }
              - { name: more_info, label: "Role / details (HTML)", widget: text }
              - { name: bio, label: "Bio", widget: markdown }
              - { name: image_circular, widget: hidden, default: false }
          - { name: join_callout, label: "“Join the lab” box (highlighted, Markdown)", widget: text, required: false }
          - name: join_buttons
            label: "“Join the lab” buttons"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link (https://…, mailto:…, or /page/)", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - name: alumni
            label: "Lab alumni (photo grid)"
            label_singular: "Alum"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: role, label: "Role", widget: string, required: false }
              - { name: dates, label: "Dates", widget: string, required: false }
              - { name: image, label: "Photo", widget: image, required: false }
          - { name: body, label: "Page content (Lab Alumni heading & intro text)", widget: markdown }

  # ---------------------------------------------------------------------------
  #  PAGES — editable text of standalone pages. All structural front-matter
  #  fields are enumerated (hidden) so saving never drops them.
  # ---------------------------------------------------------------------------
  - name: pages
    label: "Other Pages"
    description: "Text of standalone pages."
    files:
      - name: facilities
        label: "Facilities page"
        file: "_pages/facilities.md"
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: permalink, widget: hidden, default: "/facilities/" }
          - { name: title, label: "Nav label", widget: string, default: facilities }
          - { name: description, label: "SEO description", widget: text }
          - { name: nav, widget: hidden, default: true }
          - { name: nav_order, widget: hidden, default: 4 }
          - name: instruments
            label: "Field instruments"
            label_singular: "Instrument"
            widget: list
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: meta, label: "Site · years (e.g. RCREC · 2024–present)", widget: string, required: false }
              - { name: description, label: "Description", widget: text, required: false }
              - name: images
                label: "Photo(s) — first shows large; add more for a thumbnail grid"
                widget: list
                required: false
                field: { label: "Image", name: image, widget: image }
          - name: lab_equipment
            label: "Laboratory equipment"
            label_singular: "Equipment"
            widget: list
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: meta, label: "Site · years", widget: string, required: false }
              - { name: description, label: "Description", widget: text, required: false }
              - name: images
                label: "Photo(s)"
                widget: list
                required: false
                field: { label: "Image", name: image, widget: image }
          - name: gallery
            label: "Field Gallery (photos & videos)"
            label_singular: "Gallery item"
            widget: list
            collapsed: true
            required: false
            summary: "{{fields.caption}}"
            fields:
              - { name: file, label: "Photo or video file", widget: file, required: false }
              - { name: caption, label: "Caption (optional)", widget: string, required: false }
              - { name: embed, label: "…or paste a YouTube/Vimeo embed (instead of a file)", widget: text, required: false }
          - name: map
            label: "Map (just type an address)"
            widget: object
            fields:
              - { name: address, label: "Address", widget: string }
              - { name: zoom, label: "Zoom (1-20)", widget: number, default: 14, value_type: int, required: false }
          - name: visit_buttons
            label: "Visit / Tour / Partner buttons"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link (https://…, mailto:…, tel:…, or /page/)", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - { name: body, label: "Page content (intro & section text)", widget: markdown }
      - name: contact
        label: "Contact page"
        file: "_pages/contact.md"
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: permalink, widget: hidden, default: "/contact/" }
          - { name: title, label: "Nav label", widget: string, default: contact }
          - { name: description, label: "SEO description", widget: text }
          - { name: nav, widget: hidden, default: true }
          - { name: nav_order, widget: hidden, default: 7 }
          - { name: intro_callout, label: "Intro callout (highlighted welcome box, Markdown)", widget: text, required: false }
          - name: pi
            label: "Principal Investigator card"
            widget: object
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: role, label: "Role", widget: string, required: false }
              - { name: affiliation, label: "Affiliation", widget: string, required: false }
              - { name: email, label: "Email", widget: string, required: false }
              - { name: phone, label: "Phone (display, e.g. (863) 374-7053)", widget: string, required: false }
              - { name: phone_tel, label: "Phone (dial, e.g. +18633747053)", widget: string, required: false }
              - { name: address, label: "Mailing address", widget: string, required: false }
              - name: buttons
                label: "Buttons"
                label_singular: "Button"
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.label}}"
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: url, label: "Link (https://…, mailto:…, tel:…, or /page/)", widget: string }
                  - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
                  - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - name: map
            label: "Map (just type an address)"
            widget: object
            fields:
              - { name: address, label: "Address", widget: string }
              - { name: zoom, label: "Zoom (1-20)", widget: number, default: 15, value_type: int, required: false }
          - name: find_us
            label: "Find us — building & affiliated units"
            widget: object
            fields:
              - name: building
                label: "RCREC building"
                widget: object
                fields:
                  - { name: name, label: "Name", widget: string }
                  - name: lines
                    label: "Address lines"
                    widget: list
                    field: { label: "Line", name: line, widget: string }
                  - { name: image, label: "Building photo", widget: image, required: false }
                  - name: buttons
                    label: "Buttons"
                    widget: list
                    required: false
                    fields:
                      - { name: label, label: "Label", widget: string }
                      - { name: icon, label: "Icon (FontAwesome class)", widget: string, default: "fas fa-link" }
                      - { name: url, label: "URL", widget: string }
                      - { name: ghost, label: "Outline style", widget: boolean, default: false }
              - name: affiliations
                label: "Affiliated units (one card each)"
                label_singular: "Affiliated unit"
                widget: list
                collapsed: true
                summary: "{{fields.short}}"
                fields:
                  - { name: name, label: "Full name", widget: string }
                  - { name: short, label: "Button label", widget: string }
                  - { name: image, label: "Photo or logo", widget: image, required: false }
                  - { name: is_logo, label: "Image is a logo/wordmark (show whole, on white)", widget: boolean, default: false }
                  - { name: url, label: "Link URL", widget: string }
                  - { name: icon, label: "Button icon (FontAwesome class)", widget: string, default: "fas fa-link" }
          - name: follow_links
            label: "Follow the lab — links"
            label_singular: "Link"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - name: join_buttons
            label: "Join the Lab — buttons"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link (https://…, mailto:…, or /page/)", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - name: postdoc_buttons
            label: "Postdoc & collaborator — buttons"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link (https://…, mailto:…, or /page/)", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - { name: body, label: "Page content (Join the Lab & Postdoc text only)", widget: markdown }
      - name: news
        label: "News page"
        file: "_pages/news.md"
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: permalink, widget: hidden, default: "/news/" }
          - { name: title, label: "Nav label", widget: string, default: news }
          - { name: description, label: "SEO description", widget: text }
          - { name: nav, widget: hidden, default: true }
          - { name: nav_order, widget: hidden, default: 6 }
          - name: footer_buttons
            label: "Buttons under the news list"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - { name: body, label: "Page body (keep the news-list line as-is)", widget: markdown }
      - name: publications
        label: "Publications page"
        file: "_pages/publications.md"
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: permalink, widget: hidden, default: "/publications/" }
          - { name: title, label: "Nav label", widget: string, default: publications }
          - { name: description, label: "SEO description", widget: text }
          - { name: nav, widget: hidden, default: true }
          - { name: nav_order, widget: hidden, default: 5 }
          - name: top_buttons
            label: "Buttons above the publication list"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - name: bottom_buttons
            label: "Buttons below the publication list"
            label_singular: "Button"
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url, label: "Link", widget: string }
              - { name: icon, label: "Icon (FontAwesome class, optional)", widget: string, required: false }
              - { name: style, label: "Style: primary, ghost, or blank", widget: string, required: false }
          - { name: body, label: "Page body (keep the search & bibliography lines as-is)", widget: markdown }
