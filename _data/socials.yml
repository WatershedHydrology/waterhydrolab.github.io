# =============================================================================
#  Social links and external profiles for the Watershed Hydrology Lab.
# =============================================================================
#  These appear as icons on the homepage (about.md) and at the bottom of
#  profile pages. Icons are rendered automatically by the jekyll-socials
#  plugin: https://github.com/george-gca/jekyll-socials
#
#  Each key (orcid, scholar_userid, etc.) maps to a known icon. To enable a
#  link, fill in the value. To hide a link, comment the line out with a #.
#  Order in this file = order shown on the page.
#
#  When adding social profiles for individual lab members later, you can
#  duplicate this file (e.g. _data/socials_saba.yml) and reference it from
#  the member's profile page.
# =============================================================================

# ----- Primary contact -----
# The legacy ufrcrecwater.com site listed hydrologyrcrecflorida@gmail.com
# as a lab inbox, but the PI uses her UF email as the canonical contact.
# `email:` below sets the e-mail icon target in the homepage social row
# and is also the address shown on the contact page.
email: g.golmohammadi@ufl.edu

# ----- Academic identifiers (PI: Dr. Golmar Golmohammadi) -----
orcid_id: 0000-0001-5532-3892 # ORCID — https://orcid.org/0000-0001-5532-3892
scholar_userid: cpXxmlYAAAAJ # Google Scholar — VERIFY this ID with Dr. Golmohammadi before going live
research_gate_profile: Golmar-Golmohammadi # ResearchGate slug (jekyll-socials key MUST be `research_gate_profile` with underscore)
# scopus_id:                            # Scopus author ID (not yet known — add when found)
# semanticscholar_id:                   # Semantic Scholar author ID
# publons_id:                           # Publons / Web of Science

